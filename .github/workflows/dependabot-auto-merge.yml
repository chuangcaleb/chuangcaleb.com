name: Dependabot Auto-merge to Staging

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [staging]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run on Dependabot PRs targeting staging branch
    if: github.actor == 'dependabot[bot]' && github.base_ref == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build
        env:
          # Dependabot-triggered workflows can only read Dependabot secrets.
          # Use identical secret names in Actions and Dependabot settings.
          IMAGE_DOMAIN: ${{ secrets.IMAGE_DOMAIN }}
          IMAGE_BASE_URL: ${{ secrets.IMAGE_BASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GUESTBOOK_GOOGLE_SHEET_ID: ${{ secrets.GUESTBOOK_GOOGLE_SHEET_ID }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for minor and patch updates
        # Auto-merge for patch and minor updates only to staging branch
        # Skip auto-merge if build fails
        if: |
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor') &&
          steps.build.outcome == 'success'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failed minor/patch updates
        # Leave a comment when minor/patch updates fail build and require manual review
        if: |
          steps.build.outcome == 'failure' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: |
          gh pr comment "$PR_URL" --body "❌ **Build Failed - Manual Review Required**

          This dependency update failed CI, so it was **not** auto-merged to \\`staging\\`.

          **Action needed:**
          - Review CI logs to identify the failure
          - Confirm whether the failure is related to this dependency update
          - Fix issues (or recreate the PR) and re-run checks
          - Manually merge when all checks pass"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates
        # Leave a comment for major updates requiring manual review before merging to staging
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Major Version Update**

          This is a major version update and requires manual review before merging to \`staging\`.

          **Review checklist:**
          - [ ] Check the changelog for breaking changes
          - [ ] Review the migration guide if available
          - [ ] Consider testing locally before merging
          - [ ] After merging to \`staging\`, a PR to \`main\` will be auto-created for final review

          **If CI fails:**
          - Review the CI logs to determine if the failure is related to this update
          - Use \`@dependabot recreate\` to recreate the PR if needed
          - Or manually fix issues and push to this branch"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
